<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pharma Sim</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#0C0E14;--s:#141720;--card:#171B28;--cb:#252A3A;
--ac:#7C6AFF;--acs:rgba(124,106,255,.1);--acg:rgba(124,106,255,.3);
--g:#34D399;--gs:rgba(52,211,153,.1);
--r:#F87171;--rs:rgba(248,113,113,.1);
--y:#FBBF24;
--t:#E4E5EA;--tm:#888DA2;--td:#50556A;
--fm:'DM Sans',system-ui,sans-serif;
--fc:'JetBrains Mono','SF Mono',monospace
}
body{background:var(--bg);color:var(--t);font-family:var(--fm);line-height:1.6;-webkit-font-smoothing:antialiased}
.wrap{max-width:840px;margin:0 auto;padding:16px 16px 60px}

#landing{min-height:90vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:22px;padding:30px 16px}
.logo{font:700 12px var(--fc);letter-spacing:5px;text-transform:uppercase;color:var(--ac)}
#landing h1{font-size:28px;font-weight:700;letter-spacing:-.5px}
#landing .sub{font-size:14px;color:var(--tm);max-width:460px;line-height:1.7}
.modes{display:flex;gap:12px;max-width:460px;width:100%}
.mc{flex:1;padding:18px 16px;border-radius:13px;border:2px solid var(--cb);background:var(--s);cursor:pointer;text-align:left;transition:.15s}
.mc.on{border-color:var(--ac);background:var(--acs)}
.mc h3{font-size:13px;font-weight:600;margin-bottom:3px}
.mc p{font-size:11px;color:var(--tm)}
.btn{padding:14px 36px;border-radius:12px;border:none;background:var(--ac);color:#fff;font:600 15px var(--fm);cursor:pointer;box-shadow:0 4px 20px var(--acg);transition:.15s}
.btn:hover{transform:scale(1.03)}

#topbar{display:none;position:sticky;top:0;z-index:100;background:rgba(12,14,20,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--cb);padding:10px 0}
.tb{max-width:840px;margin:0 auto;padding:0 16px;display:flex;align-items:center;justify-content:space-between;gap:14;flex-wrap:wrap}
.st{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--tm)}
.st b{color:var(--t);font-family:var(--fc);font-weight:600}
.timer-warn{color:var(--y) !important}
.timer-crit{color:var(--r) !important;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.pbar{flex:1;max-width:200px;height:4px;border-radius:2px;background:var(--cb);overflow:hidden}
.pfill{height:100%;border-radius:2px;background:var(--ac);transition:width .3s}
.bend{padding:8px 18px;border-radius:9px;border:1px solid var(--r);background:transparent;color:var(--r);font:500 12px var(--fm);cursor:pointer;transition:.15s}
.bend:hover{background:var(--rs)}

.navbox{background:var(--s);border-radius:12px;border:1px solid var(--cb);padding:8px 14px;margin-bottom:16px}
.navbox .lbl{font-size:10px;color:var(--td);font-weight:600;margin-bottom:4px}
.ng{display:flex;flex-wrap:wrap;gap:3px}
.nd{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font:600 9px var(--fc);cursor:pointer;transition:.1s;border:1px solid var(--cb);color:var(--td)}
.nd.dn{border-color:var(--ac);background:var(--acs);color:var(--ac)}

.qc{background:var(--card);border:1px solid var(--cb);border-radius:14px;padding:20px 22px 14px;margin-bottom:12px}
.qh{display:flex;gap:10px;align-items:flex-start;margin-bottom:12px}
.qn{font:700 10px var(--fc);color:var(--ac);background:var(--acs);border-radius:7px;padding:3px 9px;white-space:nowrap;margin-top:2px}
.qt{font-size:14px;font-weight:500;line-height:1.6}
.mt{color:var(--y);font-size:11px;margin-left:6px}
.os{display:grid;gap:6px}
.op{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;border:1.5px solid var(--cb);background:var(--s);color:var(--t);font-size:13px;cursor:pointer;transition:.12s;user-select:none}
.op:hover{border-color:rgba(124,106,255,.35)}
.op.sel{border-color:var(--ac);background:var(--acs)}
.op.ok{border-color:var(--g);background:var(--gs);cursor:default}
.op.ko{border-color:var(--r);background:var(--rs);cursor:default}
.op.mi{border-color:var(--g);background:var(--gs);color:var(--g);cursor:default}
.op.lk{cursor:default}
.op.lk:hover{border-color:var(--cb)}
.ol{font:700 10px var(--fc);opacity:.45;width:16px;text-align:center;flex-shrink:0}
.ot{flex:1}
.oi{margin-left:auto;font-size:13px}
.src{font:400 9px var(--fc);color:var(--td);margin-top:8px;padding-left:2px}

#summary{display:none}
.sh{text-align:center;padding:30px 0 24px}
.sc{width:120px;height:120px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto}
.sc.pass{border:4px solid var(--g);background:var(--gs)}
.sc.fail{border:4px solid var(--r);background:var(--rs)}
.sn{font:800 34px var(--fc);line-height:1}
.sl{font-size:10px;color:var(--tm);margin-top:2px}
.sd{text-align:left;font-size:13px}
.sd div{margin-bottom:6px}
.fr{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:24px}
.fb{padding:6px 14px;border-radius:8px;border:1px solid var(--cb);background:transparent;color:var(--tm);font:500 11px var(--fm);cursor:pointer;transition:.12s}
.fb.on{border-color:var(--ac);background:var(--acs);color:var(--ac)}
.ctr{text-align:center;padding:28px 0}

/* Modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:9999;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-bg.show{display:flex}
.modal{background:var(--card);border:1px solid var(--cb);border-radius:18px;padding:32px 28px;max-width:400px;width:90%;text-align:center}
.modal h3{font-size:17px;font-weight:700;margin-bottom:8px}
.modal p{font-size:13px;color:var(--tm);margin-bottom:22px;line-height:1.6}
.modal-btns{display:flex;gap:10px;justify-content:center}
.modal-btns button{padding:10px 24px;border-radius:10px;font:600 13px var(--fm);cursor:pointer;transition:.15s}
.mbtn-cancel{border:1px solid var(--cb);background:transparent;color:var(--tm)}
.mbtn-cancel:hover{background:var(--s)}
.mbtn-confirm{border:none;background:var(--r);color:#fff}
.mbtn-confirm:hover{opacity:.85}

@media(max-width:600px){.modes{flex-direction:column}.tb{gap:8px}.pbar{max-width:120px}.qc{padding:16px 14px 12px}}
</style>
</head>
<body>

<div id="landing">
  <div class="logo">Pharma Sim</div>
  <h1>Simulatore Esame di Farmacologia</h1>
  <p class="sub" id="dbcount"></p>
  <div class="modes">
    <div class="mc on" id="mc-end" onclick="pickMode('end')"><h3>&#127919; A fine sessione</h3><p>Risposte corrette visibili solo dopo aver terminato</p></div>
    <div class="mc" id="mc-inst" onclick="pickMode('instant')"><h3>&#9889; Risultato immediato</h3><p>Feedback verde/rosso appena clicchi</p></div>
  </div>
  <button class="btn" onclick="startExam()">Avvia Simulazione (60 domande)</button>
</div>

<div id="topbar">
  <div class="tb">
    <div class="st">&#9201; <b id="timer">45:00</b></div>
    <div class="st"><b id="cnt">0</b>/<span id="tot">60</span> risposte</div>
    <div class="pbar"><div class="pfill" id="pbar" style="width:0%"></div></div>
    <button class="bend" onclick="askFinish()">Termina</button>
  </div>
</div>

<div id="exam" class="wrap" style="display:none"></div>
<div id="summary" class="wrap" style="display:none"></div>

<!-- Custom modal (no confirm()) -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <h3 id="modal-title">Terminare la sessione?</h3>
    <p id="modal-msg"></p>
    <div class="modal-btns">
      <button class="mbtn-cancel" onclick="closeModal()">Continua esame</button>
      <button class="mbtn-confirm" onclick="confirmFinish()">Termina</button>
    </div>
  </div>
</div>

const L="ABCDE",L2I={A:0,B:1,C:2,D:3,E:4};
const EXAM_DURATION=45*60*1000; // 45 min in ms
let mode="end",qs=[],ans={},t0=null,t1=null,tIv=null,filt="all",timeUp=false;

function esc(s){const d=document.createElement("div");d.textContent=s;return d.innerHTML}
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=0|Math.random()*(i+1);[b[i],b[j]]=[b[j],b[i]]}return b}
function ci(q){return q.c.includes(",")?q.c.split(",").map(function(x){return L2I[x.trim()]}):[L2I[q.c]]}
function fmt(ms){
  if(ms<0)ms=0;
  var m=0|ms/6e4,s=0|(ms%6e4)/1e3;
  return String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");
}

function stats(){
  var ok=0,n=Object.keys(ans).length;
  qs.forEach(function(q,i){if(ans[i]!==undefined&&ci(q).includes(ans[i]))ok++});
  return{ok:ok,ko:n-ok,na:qs.length-n,n:n,pct:qs.length?Math.round(ok/qs.length*100):0};
}

function pickMode(m){
  mode=m;
  document.getElementById("mc-end").className="mc"+(m==="end"?" on":"");
  document.getElementById("mc-inst").className="mc"+(m==="instant"?" on":"");
}

// ── Timer (countdown) ──
function tickTimer(){
  var remaining=EXAM_DURATION-(Date.now()-t0);
  var el=document.getElementById("timer");
  if(!el)return;
  if(remaining<=0){
    el.textContent="00:00";
    el.className="timer-crit";
    if(!timeUp){timeUp=true;doFinish();}
    return;
  }
  el.textContent=fmt(remaining);
  // Warning colors
  if(remaining<=5*60*1000) el.className="timer-crit";
  else if(remaining<=10*60*1000) el.className="timer-warn";
  else el.className="";
}

// ── Start ──
function startExam(){
  qs=shuffle(DB).slice(0,60);ans={};t0=Date.now();t1=null;filt="all";timeUp=false;
  document.getElementById("landing").style.display="none";
  document.getElementById("topbar").style.display="block";
  document.getElementById("exam").style.display="block";
  document.getElementById("summary").style.display="none";
  document.getElementById("tot").textContent=qs.length;
  renderExam();
  tIv=setInterval(tickTimer,1000);
  tickTimer();
  window.scrollTo(0,0);
}

function renderExam(){
  var ex=document.getElementById("exam");
  var h='<div class="navbox"><div class="lbl">NAVIGAZIONE</div><div class="ng" id="nav">';
  for(var i=0;i<qs.length;i++) h+='<div class="nd" id="nv'+i+'" onclick="jumpTo('+i+')">'+(i+1)+'</div>';
  h+='</div></div>';
  qs.forEach(function(q,i){h+=mkQ(q,i,false)});
  h+='<div class="ctr"><button class="btn" onclick="askFinish()">Termina sessione</button></div>';
  ex.innerHTML=h;
}

function mkQ(q,i,reveal){
  var c=ci(q),multi=c.length>1,a=ans[i],show=reveal||(mode==="instant"&&a!==undefined);
  var h='<div class="qc" id="q'+i+'"><div class="qh"><span class="qn">'+String(i+1).padStart(2,"0")+'</span>';
  h+='<span class="qt">'+esc(q.q)+(multi?'<span class="mt">(risposta multipla)</span>':'')+'</span></div><div class="os">';
  q.o.forEach(function(o,j){
    var cls="op",icon="";
    if(show){
      var isC=c.includes(j);
      if(isC&&a===j){cls="op ok lk";icon='<span class="oi">&#10003;</span>'}
      else if(isC&&a!==j){cls="op mi lk";icon='<span class="oi" style="font-size:10px">corretta</span>'}
      else if(!isC&&a===j){cls="op ko lk";icon='<span class="oi">&#10007;</span>'}
      else cls="op lk";
    } else if(a===j) cls="op sel";
    var oc=show?'':'onclick="pick('+i+','+j+')"';
    h+='<div class="'+cls+'" id="o'+i+'_'+j+'" '+oc+'><span class="ol">'+L[j]+'</span><span class="ot">'+esc(o)+'</span>'+icon+'</div>';
  });
  h+='</div><div class="src">&#128196; '+esc(q.s)+'</div></div>';
  return h;
}

function pick(i,j){
  if(mode==="instant"&&ans[i]!==undefined)return;
  ans[i]=j;
  if(mode==="instant"){
    var el=document.getElementById("q"+i);
    if(el){var d=document.createElement("div");d.innerHTML=mkQ(qs[i],i,false);el.replaceWith(d.firstElementChild)}
  } else {
    var qc=document.getElementById("q"+i);
    if(qc){var ops=qc.querySelectorAll(".op");ops.forEach(function(o,idx){o.className=idx===j?"op sel":"op"})}
  }
  var nv=document.getElementById("nv"+i);if(nv)nv.className="nd dn";
  updBar();
}

function updBar(){
  var s=stats();
  document.getElementById("cnt").textContent=s.n;
  document.getElementById("pbar").style.width=(s.n/qs.length*100)+"%";
}

function jumpTo(i){var el=document.getElementById("q"+i);if(el)el.scrollIntoView({behavior:"smooth",block:"center"})}

// ── Modal (replaces confirm()) ──
function askFinish(){
  var s=stats();
  if(s.n>=qs.length){doFinish();return}
  document.getElementById("modal-title").textContent="Terminare la sessione?";
  document.getElementById("modal-msg").textContent="Hai risposto a "+s.n+" domande su "+qs.length+". Le domande senza risposta saranno considerate errate.";
  document.getElementById("modal").classList.add("show");
}

function closeModal(){document.getElementById("modal").classList.remove("show")}

function confirmFinish(){closeModal();doFinish()}

function doFinish(){
  clearInterval(tIv);t1=Date.now();
  document.getElementById("topbar").style.display="none";
  document.getElementById("exam").style.display="none";
  document.getElementById("summary").style.display="block";
  renderSummary();
  window.scrollTo(0,0);
}

function renderSummary(){
  var s=stats();
  var elapsed=t1-t0;
  var used=Math.min(elapsed,EXAM_DURATION);
  var m=0|used/6e4,sc=0|(used%6e4)/1e3;
  var pass=s.pct>=60;
  var timeLabel=timeUp?"Tempo scaduto":"Completato in "+m+"m "+sc+"s";

  var h='<div class="sh"><div class="logo">Risultati</div>';
  h+='<h1 style="font-size:24px;font-weight:700;margin:8px 0 20px">Sessione completata</h1>';
  if(timeUp) h+='<p style="color:var(--r);font-size:13px;margin-bottom:16px">&#9200; Tempo scaduto — sessione terminata automaticamente</p>';
  h+='<div style="display:flex;align-items:center;justify-content:center;gap:36px;flex-wrap:wrap;margin-bottom:20px">';
  h+='<div class="sc '+(pass?"pass":"fail")+'"><div class="sn">'+s.pct+'%</div><div class="sl">'+s.ok+'/'+qs.length+'</div></div>';
  h+='<div class="sd"><div style="color:var(--tm)">&#9201; '+esc(timeLabel)+'</div>';
  h+='<div style="color:var(--g)">&#10003; Corrette: <b>'+s.ok+'</b></div>';
  h+='<div style="color:var(--r)">&#10007; Sbagliate: <b>'+s.ko+'</b></div>';
  h+='<div style="color:var(--y)">&#9675; Non risposte: <b>'+s.na+'</b></div></div></div>';

  h+='<div class="fr">';
  var filters=[["all","Tutte ("+qs.length+")"],["ko","Sbagliate ("+s.ko+")"],["ok","Corrette ("+s.ok+")"],["na","Non risposte ("+s.na+")"]];
  filters.forEach(function(f){
    h+='<button class="fb'+(filt===f[0]?' on':'')+'" onclick="setFilt(\x27'+f[0]+'\x27)">'+f[1]+'</button>';
  });
  h+='</div></div>';

  qs.forEach(function(q,i){
    var a=ans[i],c=ci(q),isOk=a!==undefined&&c.includes(a);
    if(filt==="ko"&&(a===undefined||isOk))return;
    if(filt==="ok"&&!isOk)return;
    if(filt==="na"&&a!==undefined)return;
    h+=mkQ(q,i,true);
  });
  h+='<div class="ctr"><button class="btn" onclick="restart()">Nuova simulazione</button></div>';
  document.getElementById("summary").innerHTML=h;
}

function setFilt(f){filt=f;renderSummary()}

function restart(){
  clearInterval(tIv);
  document.getElementById("landing").style.display="flex";
  document.getElementById("topbar").style.display="none";
  document.getElementById("exam").style.display="none";
  document.getElementById("summary").style.display="none";
  document.getElementById("modal").classList.remove("show");
  window.scrollTo(0,0);
}

document.getElementById("dbcount").textContent=DB.length+" domande in archivio. Ogni sessione estrae 60 domande casuali. Tempo: 45 minuti.";
</script>
</body>
</html>
